interface:
  display_name: "Explainer"
  short_description: "Write a browser-friendly HTML explanation with Monaco diff views"
  default_prompt: "Use $explainer to inspect staged changes, unstaged changes, or another existing change set, compare it to the clearest baseline, copy `references/review-page-template.html` as the canonical visual and structural sample unless the user explicitly asks for a different design, preserve the template's core DOM structure, CSS blocks, and code-viewer styling, write an HTML explanation file into the default `explain/` folder unless the user provides a path, use Monaco Diff Editor as the default renderer for modified code sections, keep the page scan-first rather than fully expanded when many snippets are present, include reviewer-useful changed code inside the `User-Visible Behavior` and `File Groups And Rationale` sections with a short explanation attached to each code block, preserve code lines verbatim with no added spaces or line wrapping, validate that the final file still matches the template structure, and then briefly tell the user where the file was saved without drifting into implementation or code review."
