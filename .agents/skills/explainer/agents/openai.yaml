interface:
  display_name: "Explainer"
  short_description: "Write a browser-friendly HTML explanation with annotated code changes"
  default_prompt: "Use $explainer to inspect staged changes, unstaged changes, or another existing change set, compare it to the clearest baseline, follow `references/review-page-template.html` as the default visual and structural sample, apply `../uncodixfy/SKILL.md` as a hard constraint against generic AI UI patterns, write a self-contained HTML explanation file into the default `explain/` folder unless the user provides a path, include reviewer-useful changed code inside the `User-Visible Behavior` and `File Groups And Rationale` sections with a short explanation attached to each code block, and then briefly tell the user where the file was saved without drifting into implementation or code review."
