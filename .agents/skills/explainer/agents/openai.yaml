interface:
  display_name: "Explainer"
  short_description: "Write a review-ready Markdown explanation with changed code"
  default_prompt: "Use $explainer to inspect staged changes, unstaged changes, or another existing change set, compare it to the clearest baseline, write a Markdown explanation file into the default `explain/` folder unless the user provides a path, and include reviewer-useful changed code inside the `User-Visible Behavior` and `File Groups And Rationale` sections before briefly telling the user where the file was saved without drifting into implementation or code review."
